on:
  workflow_call:
    inputs:
      build_type:
        required: true
        type: string
      branch:
        type: string
      date:
        type: string
      sha:
        type: string
      repo:
        type: string
      node_type:
        type: string
        default: "cpu4"
      script:
        type: string
        default: "ci/build_conda_python.sh"
      matrix_filter:
        type: string
        default: "."
      CPU:
        type: string
        default: "amd64"
      upload_to_conda:
        type: boolean
        required: false
defaults:
  run:
    shell: bash
permissions:
  actions: read
  checks: none
  contents: read
  deployments: none
  discussions: none
  id-token: write
  issues: none
  packages: read
  pages: none
  pull-requests: read
  repository-projects: none
  security-events: none
  statuses: none
jobs:
  compute-matrix:
    runs-on: ubuntu-latest
    outputs:
      MATRIX: ${{ steps.compute-matrix.outputs.MATRIX }}
    steps:
      - name: Compute Build Matrix
        id: compute-matrix
        run: |
          set -eo pipefail

          # Please keep the matrices sorted in ascending order by the following:
          #
          #     [ARCH, PY_VER]
          #
          export MATRIX="
          # amd64
          - { ARCH: 'amd64', PY_VER: '3.10' }
          - { ARCH: 'amd64', PY_VER: '3.11' }
          - { ARCH: 'amd64', PY_VER: '3.12' }
          - { ARCH: 'amd64', PY_VER: '3.13' }
          - { ARCH: 'amd64', PY_VER: '3.14' }
          # arm64
          - { ARCH: 'arm64', PY_VER: '3.10' }
          - { ARCH: 'arm64', PY_VER: '3.11' }
          - { ARCH: 'arm64', PY_VER: '3.12' }
          - { ARCH: 'arm64', PY_VER: '3.13' }
          - { ARCH: 'arm64', PY_VER: '3.14' }
          "

          MATRIX="$(
            yq -n -o json 'env(MATRIX)' | \
            jq -c '${{ inputs.matrix_filter }} | if (. | length) > 0 then {include: .} else "Error: Empty matrix\n" | halt_error(1) end'
          )"

          echo "MATRIX=${MATRIX}" | tee --append "${GITHUB_OUTPUT}"
  fetch-gha-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: rapidsai/gha-tools
          ref: v0.0.198
          path: gha-tools
          fetch-depth: 1
      - uses: actions/upload-artifact@v6
        with:
          name: rapids-gha-tools
          path: gha-tools
          if-no-files-found: error
  build:
    needs:
      - compute-matrix
      - fetch-gha-tools
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-matrix.outputs.MATRIX) }}
    runs-on: "linux-${{ matrix.ARCH }}-${{ inputs.node_type }}"
    env:
      RAPIDS_ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
      RAPIDS_CONDA_BLD_OUTPUT_DIR: /tmp/conda-bld-output
      RAPIDS_CONDA_BLD_ROOT_DIR: /tmp/conda-bld-workspace
    container:
      image: condaforge/miniforge3:26.1.1-3
      env:
        RAPIDS_BUILD_TYPE: ${{ inputs.build_type }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 43200 # 12h
      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.sha }}
          fetch-depth: 0
      # One clone in fetch-gha-tools; matrix jobs only download the artifact into the mounted workspace.
      - uses: actions/download-artifact@v6
        with:
          name: rapids-gha-tools
          path: ${{ github.workspace }}
      - name: Add RAPIDS gha-tools to PATH
        run: echo "${GITHUB_WORKSPACE}/tools" | tee -a "${GITHUB_PATH}"
      - name: Mark workspace safe for the git command
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Standardize repository information
        run: |
          echo "RAPIDS_REPOSITORY=${{ inputs.repo || github.repository }}" >> "${GITHUB_ENV}"
          echo "RAPIDS_SHA=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"
          echo "RAPIDS_REF_NAME=${{ inputs.branch || github.ref_name }}" >> "${GITHUB_ENV}"
          echo "RAPIDS_NIGHTLY_DATE=${{ inputs.date }}" >> "${GITHUB_ENV}"
      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        continue-on-error: true
        with:
          enable-apt: true
      - name: GitHub Metadata
        run: |
          GIT_DESCRIBE_TAG=$(git describe --abbrev=0)
          echo "GIT_DESCRIBE_TAG: ${GIT_DESCRIBE_TAG}"
          echo "git describe: $(git describe)"
          echo "git count commits since tag: $(git rev-list ${GIT_DESCRIBE_TAG}..HEAD --count)"
      - name: Build Conda Package
        run: ${{ inputs.script }}
        env:
          # renovate: datasource=github-releases depName=rapidsai/sccache
          SCCACHE_VER: 0.14.0-rapids.1
          GH_TOKEN: ${{ github.token }}
          PYTHON_VERSION: ${{ matrix.PY_VER }}
      - name: Upload conda repo
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: conda-repo-${{ matrix.ARCH }}-${{ matrix.PY_VER }}
          path: ${{ env.RAPIDS_CONDA_BLD_OUTPUT_DIR }}
      - name: Publish Conda Package
        if: inputs.upload_to_conda
        run: "ci/upload_conda.sh"
        env:
          CONDA_TOKEN: ${{ secrets.NVIDIA_CONDA_TOKEN }}
